<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Sholat Digital</title>
    <!-- Link Font Google -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="arabic-pattern"></div> <!-- Pola Geometris Background -->
    
    <div class="container">
        <div class="header-arabic">
            <h1 class="calligraphy">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</h1>
            <p>Jurnal Ibadah Harian</p>
        </div>

        <div id="userSection">
            <span>Salam, <b id="displayNama">...</b></span>
            <button onclick="gantiNama()" class="btn-small">Ganti Nama</button>
        </div>

        <!-- Input Group Tetap Sama Seperti Sebelumnya -->
        <div class="input-card">
            <div class="input-group">
                <label>Waktu Sholat</label>
                <select id="waktuSholat">
                    <option value="Subuh">Subuh (الفجر)</option>
                    <option value="Maghrib">Maghrib (المغرب)</option>
                    <option value="Isya">Isya (العشاء)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Lokasi Ibadah</label>
                <select id="lokasi">
                    <option value="Masjid 🕌">Masjid (Berjamaah)</option>
                    <option value="Rumah 🏠">Rumah / Sendiri</option>
                </select>
            </div>

            <button onclick="tambahJurnal()" class="btn-primary">Catat Kehadiran</button>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <span id="totalSholat">0</span>
                <p>Total</p>
            </div>
            <div class="stat-box masjid">
                <span id="totalMasjid">0</span>
                <p>Masjid</p>
            </div>
        </div>

        <div class="filter-group">
            <button onclick="tampilkanData('hari')">Hari Ini</button>
            <button onclick="tampilkanData('minggu')">Mingguan</button>
            <button onclick="hapusSemua()" class="btn-danger">Reset</button>
        </div>

        <table>
            <tbody id="tabelBody"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
